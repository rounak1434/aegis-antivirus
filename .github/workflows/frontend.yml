name: Frontend

# Reusable workflow: install, build (tsc + vite), and test (vitest) the UI.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

      - name: Test (vitest)
        run: npm test
