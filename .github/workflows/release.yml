name: Release

# On a version tag (or manual dispatch): build the Windows installers, optionally
# code-sign them, generate checksums + SBOM, and publish a DRAFT GitHub release
# with all artifacts attached. A maintainer reviews and publishes the draft.
#
# Signing is OPTIONAL: it runs only if the AEGIS_SIGN_PFX_BASE64 secret is set;
# otherwise unsigned (but checksummed) artifacts are produced.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: build · sign · checksum · sbom · draft
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install SBOM tooling (best-effort)
        run: cargo install cargo-cyclonedx --locked || echo "cyclonedx unavailable; fallback generator will be used"
        shell: bash

      - name: Build installers (MSI + NSIS + portable)
        run: pwsh deploy/build-installers.ps1

      - name: Code sign (optional — only if a cert secret is present)
        env:
          AEGIS_SIGN_PFX_BASE64: ${{ secrets.AEGIS_SIGN_PFX_BASE64 }}
          AEGIS_SIGN_PFX_PASSWORD: ${{ secrets.AEGIS_SIGN_PFX_PASSWORD }}
        run: pwsh deploy/sign.ps1

      - name: Assemble release (checksums + SBOM + manifest)
        env:
          AEGIS_GPG_KEY_ID: ${{ secrets.AEGIS_GPG_KEY_ID }}
        run: pwsh deploy/make-release.ps1

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: aegis-release
          path: dist/*

      - name: Publish draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: ${{ github.ref_name }}
          files: dist/*
          body: |
            Aegis Antivirus ${{ github.ref_name }}.

            Artifacts: MSI, NSIS setup, portable ZIP, `SHA256SUMS`
            (+ `.sig` when signed), CycloneDX SBOM, and license/dependency
            inventories. Verify with `deploy/verify-release.ps1`.

            > Code-signed only when the signing secret is configured; otherwise
            > artifacts are unsigned but checksummed.
