name: Bug report
description: Report a defect in Aegis Antivirus
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run '...'
        2. Scan '...'
        3. See error
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component / crate
      placeholder: "e.g. aegis-scan, aegis-detect, UI"
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "git short hash or release tag"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Windows 11 23H2
        - Rust: 1.96.0 (msvc)
        - Node: 20.x
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
