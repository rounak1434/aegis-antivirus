# cargo-deny configuration (schema v2). Tuned for the Aegis workspace.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Add advisory IDs here only with a justification if a transitive fix is pending.
ignore = []

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "BSL-1.0",
  "CC0-1.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "OpenSSL",
]
# Crates whose license is non-SPDX or needs a hash clarification.
exceptions = [
  { name = "ring", allow = ["OpenSSL", "ISC", "MIT"] },
  { name = "unicode-ident", allow = ["Unicode-DFS-2016", "MIT", "Apache-2.0"] },
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
